name: SPEC-6 CI

permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]

jobs:
  ci_checks:
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: python -m pip install pytest

    - name: Check import scope
      run: python ci/check_import_scope.py

    - name: Check signature
      run: python ci/check_signature.py

    - name: Check PR scope
      run: python ci/check_pr_scope.py
      env:
        ALLOW_MULTI_MODULE: "true"

    - name: Check spec lock
      run: python ci/check_spec_lock.py
      env:
        GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        ALLOW_SPEC_MODIFICATION: "true"

      - name: Unit tests
        run: python -m unittest discover tests
        
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

    - name: Unit tests
      run: python -m unittest discover tests

    - name: Check schema import
      run: python -c "import spec.schema"
