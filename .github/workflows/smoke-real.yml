name: Real BitBrowser Smoke

# Manually dispatched smoke tests against a real BitBrowser instance.
# Requires the `BITBROWSER_API_KEY` repository secret to be set by a
# maintainer — without it the harness skips (pytest.mark.skipif).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pytest

      - name: Real BitBrowser smoke
        env:
          BITBROWSER_API_KEY: ${{ secrets.BITBROWSER_API_KEY }}
        run: pytest tests/smoke/ -m real_browser -v
