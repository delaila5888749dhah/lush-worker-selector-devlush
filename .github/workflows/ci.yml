name: SPEC-6 CI

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci_checks:
    runs-on: ubuntu-latest
    env:
      ALLOW_SPEC_MODIFICATION: ${{ (contains(github.event.pull_request.labels.*.name, 'approved-override') || vars.CHANGE_CLASS_APPROVED == 'true') && 'true' || 'false' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: python -m pip install pytest

    - name: Check import scope
      run: python ci/check_import_scope.py

    - name: Check signature
      run: python ci/check_signature.py

    - name: Fetch PR review state
      id: review_state
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        REVIEWS=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews --jq '[.[] | select(.state == "APPROVED")] | length' 2>/dev/null || echo "0")
        if [ "$REVIEWS" -gt 0 ]; then
          echo "state=APPROVED" >> "$GITHUB_OUTPUT"
        else
          echo "state=PENDING" >> "$GITHUB_OUTPUT"
        fi

    - name: Check PR scope
      run: python ci/check_pr_scope.py
      env:
        CHANGE_CLASS: ${{ vars.CHANGE_CLASS || '' }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        CHANGE_CLASS_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'approved-override') && 'true' || vars.CHANGE_CLASS_APPROVED || 'false' }}
        PR_REVIEW_STATE: ${{ steps.review_state.outputs.state }}

    - name: Check spec consistency
      run: python ci/check_spec_consistency.py

    - name: Check version consistency
      run: python ci/check_version_consistency.py

    - name: Check spec lock
      run: python ci/check_spec_lock.py
      env:
        GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        CHANGE_CLASS_APPROVED: ${{ vars.CHANGE_CLASS_APPROVED || 'false' }}

    - name: Unit tests
      run: python -m unittest discover tests

    - name: Meta audit
      run: python ci/meta_audit.py
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        CHANGE_CLASS_APPROVED: ${{ vars.CHANGE_CLASS_APPROVED || 'false' }}
        GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
        GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
