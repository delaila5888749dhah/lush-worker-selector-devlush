name: Blueprint Contracts

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml jsonschema

      - name: Run blueprint contract gate
        run: python ci/check_blueprint_contracts.py --strict

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blueprint-coverage
          path: docs/blueprint_coverage.md
          if-no-files-found: warn
